name: Deploy to Cloudflare

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

env:
  CLOUDFLARE_SUBDOMAIN: zarbazan
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install worker dependencies
        run: npm install
        working-directory: worker

      - name: Build Worker
        run: npx vite build
        working-directory: worker

      - name: Set worker name
        id: worker-name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=overture-s3-proxy-preview" >> "$GITHUB_OUTPUT"
          else
            echo "name=overture-s3-proxy" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Worker
        run: npx wrangler deploy --config dist/overture_s3_proxy/wrangler.json --name ${{ steps.worker-name.outputs.name }}
        working-directory: worker

      - name: Build frontend
        run: npm install && npm run build
        env:
          VITE_API_URL: https://${{ steps.worker-name.outputs.name }}.${{ env.CLOUDFLARE_SUBDOMAIN }}.workers.dev

      - name: Create Pages project if needed
        run: npx wrangler pages project create overture-maps --production-branch=master 2>/dev/null || true

      - name: Deploy Pages (production)
        if: github.event_name == 'push'
        run: npx wrangler pages deploy dist --project-name=overture-maps --commit-dirty=true

      - name: Deploy Pages (preview)
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        run: npx wrangler pages deploy dist --project-name=overture-maps --commit-dirty=true --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.head_ref }}'.replace(/\//g, '-');
            const previewUrl = `https://${branch}.overture-maps.pages.dev`;
            const workerUrl = `https://${{ steps.worker-name.outputs.name }}.${{ env.CLOUDFLARE_SUBDOMAIN }}.workers.dev`;
            const marker = '<!-- preview-comment -->';
            const body = `${marker}\n🚀 Preview deployed to: ${previewUrl}\n🔧 Worker: ${workerUrl}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
